<div class="game">
  <h2>High-Low Equation Game</h2>
  <p>Use the operations to make 1 or 21.</p>

  <p>Chips: {{ chips }}</p>

  <div class="controls">
    <label>
      Bet:
      <input type="number" [(ngModel)]="bet" min="1" [max]="chips" />
    </label>

    <div class="cards">
      <span *ngFor="let c of cards" class="card">{{ c }}</span>
    </div>

    <div class="ops">
      <select [(ngModel)]="op1" name="op1">
        <option>+</option>
        <option>-</option>
        <option>*</option>
        <option>/</option>
      </select>
      <select [(ngModel)]="op2" name="op2">
        <option>+</option>
        <option>-</option>
        <option>*</option>
        <option>/</option>
      </select>
    </div>

    <button type="button" (click)="evaluate()">Play Hand</button>
    <button type="button" (click)="dealCards()">Deal New Cards</button>
  </div>

  <p class="message">{{ message }}</p>
</div>
